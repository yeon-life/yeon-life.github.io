name: Y Life GitHub Pages 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 소스 가져오기
        uses: actions/checkout@v4
      - name: Pages 설정
        uses: actions/configure-pages@v5
      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
